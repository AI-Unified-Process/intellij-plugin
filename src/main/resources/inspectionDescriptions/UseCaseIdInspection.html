Reports <code>@UseCase(id = "UC-XXX")</code> annotations whose ID has no matching
Markdown spec file in the project. A spec is matched either by file name
(<code>UC-XXX-*.md</code>) or by the line <code>**Use Case ID:** UC-XXX</code>
in the file body.
<p>Helps catch typos and stale references after specs are renamed or deleted.</p>
